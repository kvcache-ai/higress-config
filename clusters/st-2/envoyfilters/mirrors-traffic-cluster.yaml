apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: mirrors-traffic-cluster
  namespace: higress-system
spec:
  configPatches:
  - applyTo: CLUSTER
    match:
      cluster:
        name: outbound|30002||mirrors-traffic-cluster.local
      context: GATEWAY
    patch:
      operation: MERGE
      value:
        common_http_protocol_options:
          idle_timeout: 300s
        common_lb_config:
          consistent_hashing_lb_config:
            use_hostname_for_hashing: true
        connect_timeout: 300s
        lb_policy: RING_HASH
        name: outbound|30002||mirrors-traffic-cluster.local
        ring_hash_lb_config:
          maximum_ring_size: 500
          minimum_ring_size: 500
  priority: 100
  workloadSelector:
    labels:
      app: higress-gateway
