apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: glm-test-router
  namespace: higress-system
spec:
  configPatches:
  - applyTo: HTTP_ROUTE
    match:
      context: GATEWAY
      routeConfiguration:
        vhost:
          route:
            name: glm-test
    patch:
      operation: MERGE
      value:
        match:
          case_sensitive: true
          prefix: /
        name: glm-test
        route:
          cluster: outbound|30002||glm-test-cluster.local
          timeout: 3600s
  priority: 100
  workloadSelector:
    labels:
      app: higress-gateway
