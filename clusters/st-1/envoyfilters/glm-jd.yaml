apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: glm-jd
  namespace: higress-system
spec:
  configPatches:
  - applyTo: FILTER_CHAIN
    match:
      context: GATEWAY
      listener:
        portNumber: 80
    patch:
      operation: MERGE
      value:
        transport_socket_connect_timeout: 300s
  - applyTo: FILTER_CHAIN
    match:
      context: GATEWAY
      listener:
        portNumber: 443
    patch:
      operation: MERGE
      value:
        transport_socket_connect_timeout: 300s
  - applyTo: HTTP_ROUTE
    match:
      context: GATEWAY
      routeConfiguration:
        vhost:
          route:
            name: glm-jd
    patch:
      operation: MERGE
      value:
        match:
          case_sensitive: true
          prefix: /
        name: glm-jd
        route:
          cluster: outbound|30002||glm-retry-cluster.local
          hash_policy:
          - header:
              header_name: session-id
          retry_policy:
            host_selection_retry_max_attempts: 10
            retry_host_predicate:
            - name: envoy.retry_host_predicates.previous_hosts
              typed_config:
                '@type': type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
          timeout: 3600s
  - applyTo: NETWORK_FILTER
    match:
      context: GATEWAY
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
    patch:
      operation: MERGE
      value:
        name: envoy.filters.network.http_connection_manager
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          common_http_protocol_options:
            idle_timeout: 3600s
          request_timeout: 3600s
          stream_idle_timeout: 3600s
  - applyTo: CLUSTER
    match:
      cluster:
        name: outbound|30002||glm-cluster.local
    patch:
      operation: MERGE
      value:
        common_http_protocol_options:
          idle_timeout: 300s
        connect_timeout: 300s
  priority: 100
  workloadSelector:
    labels:
      app: higress-gateway
