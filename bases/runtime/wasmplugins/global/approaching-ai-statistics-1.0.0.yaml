attributes:
- apply_to_log: true
  key: "model"
  value: "model"
  value_source: "request_body"
- apply_to_log: true
  key: "input_token"
  rule: "replace"
  value: "usage.prompt_tokens"
  value_source: "response_streaming_body"
- apply_to_log: true
  key: "output_token"
  rule: "replace"
  value: "usage.completion_tokens"
  value_source: "response_streaming_body"
- apply_to_log: true
  key: "total_token"
  rule: "replace"
  value: "usage.total_tokens"
  value_source: "response_streaming_body"
- apply_to_log: true
  key: "cached_tokens"
  rule: "replace"
  value: "usage.prompt_tokens_details.cached_tokens"
  value_source: "response_streaming_body"
- apply_to_log: true
  key: "cached_tokens"
  rule: "replace"
  value: "usage.prompt_tokens_details.cached_tokens"
  value_source: "response_body"
- apply_to_log: true
  key: "consumer"
  value: "x-mse-consumer"
  value_source: "request_header"
- apply_to_log: true
  key: "debug_auth"
  value: "authorization"
  value_source: "request_header"
use_default_response_attributes: false
